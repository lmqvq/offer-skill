<svg width="1400" height="760" viewBox="0 0 1400 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accentA" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <linearGradient id="accentB" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#34D399"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="accentC" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="220" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#7DD3FC"/>
    </marker>
  </defs>

  <rect width="1400" height="760" rx="32" fill="url(#bg)"/>

  <text x="80" y="92" fill="#F8FAFC" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">offer-skill workflow</text>
  <text x="80" y="132" fill="#93C5FD" font-size="20" font-family="Segoe UI, Arial, sans-serif">From user intent to reusable hiring analysis artifacts</text>

  <rect x="80" y="180" width="260" height="132" rx="24" fill="url(#card)" stroke="#1D4ED8" stroke-width="2" filter="url(#shadow)"/>
  <rect x="104" y="204" width="76" height="30" rx="15" fill="url(#accentA)"/>
  <text x="142" y="224" text-anchor="middle" fill="#04131F" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">INPUT</text>
  <text x="104" y="258" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">User Request</text>
  <text x="104" y="288" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">"Evaluate this resume"</text>

  <rect x="402" y="180" width="300" height="132" rx="24" fill="url(#card)" stroke="#0EA5E9" stroke-width="2" filter="url(#shadow)"/>
  <rect x="426" y="204" width="118" height="30" rx="15" fill="url(#accentA)"/>
  <text x="485" y="224" text-anchor="middle" fill="#04131F" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">ORCHESTRATION</text>
  <text x="426" y="258" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Unified Entrypoint</text>
  <text x="426" y="288" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">offer_skill.py</text>

  <rect x="764" y="180" width="280" height="132" rx="24" fill="url(#card)" stroke="#10B981" stroke-width="2" filter="url(#shadow)"/>
  <rect x="788" y="204" width="90" height="30" rx="15" fill="url(#accentB)"/>
  <text x="833" y="224" text-anchor="middle" fill="#052E21" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">CASE</text>
  <text x="788" y="258" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Create / Reuse</text>
  <text x="788" y="288" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">cases/{case_slug}</text>

  <rect x="1106" y="180" width="214" height="132" rx="24" fill="url(#card)" stroke="#F59E0B" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1130" y="204" width="72" height="30" rx="15" fill="url(#accentC)"/>
  <text x="1166" y="224" text-anchor="middle" fill="#3B1D03" font-size="14" font-family="Segoe UI, Arial, sans-serif" font-weight="700">FILES</text>
  <text x="1130" y="258" fill="#F8FAFC" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Import Inputs</text>
  <text x="1130" y="288" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">resume / JD / notes</text>

  <line x1="340" y1="246" x2="402" y2="246" stroke="#7DD3FC" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="702" y1="246" x2="764" y2="246" stroke="#7DD3FC" stroke-width="6" marker-end="url(#arrow)"/>
  <line x1="1044" y1="246" x2="1106" y2="246" stroke="#7DD3FC" stroke-width="6" marker-end="url(#arrow)"/>

  <rect x="80" y="396" width="390" height="264" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  <text x="112" y="438" fill="#E2E8F0" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Perspective Layer</text>
  <rect x="112" y="468" width="110" height="42" rx="21" fill="#1E293B" stroke="#38BDF8"/>
  <text x="167" y="494" text-anchor="middle" fill="#E0F2FE" font-size="18" font-family="Segoe UI, Arial, sans-serif">candidate</text>
  <rect x="236" y="468" width="124" height="42" rx="21" fill="#1E293B" stroke="#22C55E"/>
  <text x="298" y="494" text-anchor="middle" fill="#DCFCE7" font-size="18" font-family="Segoe UI, Arial, sans-serif">interviewer</text>
  <rect x="374" y="468" width="64" height="42" rx="21" fill="#1E293B" stroke="#F59E0B"/>
  <text x="406" y="494" text-anchor="middle" fill="#FEF3C7" font-size="18" font-family="Segoe UI, Arial, sans-serif">dual</text>
  <text x="112" y="548" fill="#94A3B8" font-size="17" font-family="Segoe UI, Arial, sans-serif">Same materials, different judgment focus:</text>
  <text x="112" y="580" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">• candidate -> storytelling, gaps, prep</text>
  <text x="112" y="612" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">• interviewer -> depth, risk, follow-ups</text>

  <rect x="506" y="396" width="390" height="264" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  <text x="538" y="438" fill="#E2E8F0" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Workflow Layer</text>
  <rect x="538" y="468" width="156" height="46" rx="16" fill="#0F172A" stroke="#38BDF8"/>
  <text x="616" y="497" text-anchor="middle" fill="#E0F2FE" font-size="18" font-family="Segoe UI, Arial, sans-serif">project-highlight</text>
  <rect x="712" y="468" width="126" height="46" rx="16" fill="#0F172A" stroke="#22C55E"/>
  <text x="775" y="497" text-anchor="middle" fill="#DCFCE7" font-size="18" font-family="Segoe UI, Arial, sans-serif">resume-eval</text>
  <rect x="538" y="530" width="140" height="46" rx="16" fill="#0F172A" stroke="#F59E0B"/>
  <text x="608" y="559" text-anchor="middle" fill="#FEF3C7" font-size="18" font-family="Segoe UI, Arial, sans-serif">mock-interview</text>
  <rect x="696" y="530" width="142" height="46" rx="16" fill="#0F172A" stroke="#A78BFA"/>
  <text x="767" y="559" text-anchor="middle" fill="#EDE9FE" font-size="18" font-family="Segoe UI, Arial, sans-serif">interview-retro</text>
  <text x="538" y="624" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">From evidence extraction to practice and review</text>

  <rect x="932" y="396" width="388" height="264" rx="28" fill="url(#card)" stroke="#334155" stroke-width="2"/>
  <text x="964" y="438" fill="#E2E8F0" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Research + Outputs</text>
  <rect x="964" y="468" width="112" height="42" rx="21" fill="#111827" stroke="#64748B"/>
  <text x="1020" y="494" text-anchor="middle" fill="#E2E8F0" font-size="18" font-family="Segoe UI, Arial, sans-serif">local-only</text>
  <rect x="1090" y="468" width="136" height="42" rx="21" fill="#111827" stroke="#0EA5E9"/>
  <text x="1158" y="494" text-anchor="middle" fill="#E0F2FE" font-size="18" font-family="Segoe UI, Arial, sans-serif">web-assisted</text>
  <rect x="1240" y="468" width="48" height="42" rx="21" fill="#111827" stroke="#F59E0B"/>
  <text x="1264" y="494" text-anchor="middle" fill="#FEF3C7" font-size="16" font-family="Segoe UI, Arial, sans-serif">deep</text>
  <text x="964" y="548" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">Outputs written into the case:</text>
  <text x="964" y="580" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">• normalized/</text>
  <text x="964" y="612" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">• derived/</text>
  <text x="1090" y="580" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">• analyses/</text>
  <text x="1090" y="612" fill="#CBD5E1" font-size="18" font-family="Segoe UI, Arial, sans-serif">• research/</text>

  <line x1="470" y1="528" x2="506" y2="528" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="896" y1="528" x2="932" y2="528" stroke="#64748B" stroke-width="4" marker-end="url(#arrow)"/>
</svg>
